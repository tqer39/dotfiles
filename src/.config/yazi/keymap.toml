# keymap.toml
# https://yazi-rs.github.io/docs/configuration/keymap
#
# Custom bindings for the claude-code zellij layout:
#   - `cd`  → cd the neighbouring shell pane to the hovered directory
#   - `yr`  → copy the git-root-relative path of the hovered entry to the clipboard
#
# Both helpers live at ~/.config/yazi/scripts/ and are invoked via `shell --`
# so that yazi shell-escapes %h automatically.

[mgr]
prepend_keymap = [
  { on = [ "c", "d" ], run = 'shell -- ~/.config/yazi/scripts/cd-shell-pane.sh %h', desc = "cd shell pane to hovered entry" },
  { on = [ "y", "r" ], run = 'shell -- ~/.config/yazi/scripts/yank-relative.sh %h', desc = "Yank git-root-relative path of hovered entry" },
]
